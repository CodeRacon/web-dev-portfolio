<section class="hero">
  <div class="atf">
    <h1
      class="role-main"
      appTextShadowOffset
      [maxOffset]="6"
      [outlineWidth]="2"
    >
      {{ "hero.role.main" | translate }}
    </h1>
    <div class="role-sub-row">
      <div class="stroke"></div>
      <p class="role-sub">{{ "hero.role.sub" | translate }}</p>
    </div>

    <p class="claim">
      {{ "hero.title.line1" | translate }}
    </p>

    <div class="proof-lines">
      <p>{{ "hero.proofLines.line1" | translate }}</p>
      <p>{{ "hero.proofLines.line2" | translate }}</p>
      <p>{{ "hero.proofLines.line3" | translate }}</p>
    </div>

    <div class="cta-group">
      <button
        type="button"
        appBoxShadowOffset
        [maxOffset]="6"
        (click)="scrollToSection('portfolio')"
      >
        {{ "hero.cta.secondary" | translate }}
      </button>
    </div>
  </div>

  <div class="hero-meta">
    <a
      class="email-link"
      href="mailto:hey@michael-buschmann.dev?subject=Hi Micha 👋🏼, I've got a project to talk about!"
    >
      hey&#64;michael-buschmann.dev
    </a>
  </div>
</section>
